name: "Update Helm Chart"
description: "Update appVersion in Chart.yaml"

inputs:
  chart-repo:
    description: "Repo containing the Helm chart"
    required: true
  branch:
    description: "Branch to update"
    required: true
  app-version:
    description: "New appVersion to set"
    required: true
  github-pat:
    description: "PAT token to access the repo"
    required: true

runs:
  using: "composite"
  steps:
    - name: Validate branch existence
      if: inputs.branch == 'upstream/b-open'
      shell: bash
      env: 
        GITHUB_PAT: ${{ inputs.github-pat }}
      run: |
        # Debugging Info (Safe)
        echo "Validating the GitHub PAT"
        if [ -z "$GITHUB_PAT" ];then
          echo "::error::GITHUB_PAT is not set. Blocking pipeline."
          exit 1
        fi

        # Check if the branch input is empty
        echo "Checking if branch input is provided..."
        if [ -z "${{ inputs.branch }}" ]; then
          echo "::error::Branch input is empty. Blocking pipeline."
          exit 1
        fi

        echo "Validating specific branch: ${{ inputs.branch }}"

        # Normalize repo input to owner/repo (strip protocol, host, trailing slashes and .git)
        REPO_INPUT='${{ inputs.chart-repo }}'
        CLEAN_REPO=$(echo "$REPO_INPUT" | sed -E 's#^https?://(www\.)?github.com/##; s#/*$##; s/\.git$//')
        echo "Checking repo: $CLEAN_REPO (host: github.com)"

        # Use GitHub API to check repository existence and token access for clearer diagnostics
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token $GITHUB_PAT" "https://api.github.com/repos/${CLEAN_REPO}")
        if [ "$HTTP_CODE" -eq 200 ]; then
          echo "Repository ${CLEAN_REPO} exists and token can access repository metadata (HTTP $HTTP_CODE)."
        elif [ "$HTTP_CODE" -eq 404 ]; then
          echo "::error::Repository '${CLEAN_REPO}' not found or token lacks permission (HTTP $HTTP_CODE)."
          exit 1
        else
          echo "::warning::GitHub API returned HTTP $HTTP_CODE while checking repository. Proceeding to git check for additional detail."
        fi

        # Use x-access-token as username to avoid special-char issues in the URL
        URL="https://x-access-token:${GITHUB_PAT}@github.com/${CLEAN_REPO}.git"
        echo "Running git ls-remote --heads against github.com/${CLEAN_REPO} (token masked)."
        if CHECK=$(git ls-remote --heads "$URL" "${{ inputs.branch }}" 2>&1); then
          echo "Branch found!"
          echo "$CHECK"
        else
          echo "::error::Git check failed!"
          echo "Error Detail: $CHECK"
          exit 1
        fi

        echo "Branch '${{ inputs.branch }}' verified."

    - name: Checkout chart repo
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.chart-repo }}
        token: ${{ inputs.github-pat }}
        ref: ${{ inputs.branch }}

    - name: Update appVersion
      shell: bash
      run: |
        sed -i -r "s/appVersion:(.*)/appVersion: ${{ inputs.app-version }}/g" Chart.yaml

    - name: Commit changes
      shell: bash
      run: |
        git config --local user.email "${{ github.repository_owner }}@bopen.com"
        git config --local user.name "${{ github.repository_owner }}"
        git add Chart.yaml
        if git diff-index --quiet HEAD; then
          echo "Nothing to commit, Chart.yaml is up-to-date."
        else
          git commit -m "🤖 Update appVersion to ${{ inputs.app-version }}"
        fi

    - name: Push changes
      shell: bash
      run: |
        git push origin ${{ inputs.branch }} --force

